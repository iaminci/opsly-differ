<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Opsly Differ — compare environment configs (.env, ConfigMaps, YAML, JSON) locally in your browser."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Opsly Differ — Compare Environments</title>
    <script>
      (function () {
        var STORAGE_KEY = "differ-theme";
        var FIRA_CODE =
          "'Fira Code', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
        var COMMON = [
          "font-sans",
          "font-serif",
          "font-mono",
          "radius",
          "shadow-opacity",
          "shadow-blur",
          "shadow-spread",
          "shadow-offset-x",
          "shadow-offset-y",
          "letter-spacing",
          "spacing",
        ];

        var defaultLight = {
          background: "oklch(1 0 0)",
          foreground: "oklch(0.145 0 0)",
          card: "oklch(1 0 0)",
          "card-foreground": "oklch(0.145 0 0)",
          popover: "oklch(1 0 0)",
          "popover-foreground": "oklch(0.145 0 0)",
          primary: "oklch(0.205 0 0)",
          "primary-foreground": "oklch(0.985 0 0)",
          secondary: "oklch(0.97 0 0)",
          "secondary-foreground": "oklch(0.205 0 0)",
          muted: "oklch(0.97 0 0)",
          "muted-foreground": "oklch(0.556 0 0)",
          accent: "oklch(0.97 0 0)",
          "accent-foreground": "oklch(0.205 0 0)",
          destructive: "oklch(0.577 0.245 27.325)",
          "destructive-foreground": "oklch(1 0 0)",
          border: "oklch(0.922 0 0)",
          input: "oklch(0.922 0 0)",
          ring: "oklch(0.708 0 0)",
          "chart-1": "oklch(0.81 0.10 252)",
          "chart-2": "oklch(0.62 0.19 260)",
          "chart-3": "oklch(0.55 0.22 263)",
          "chart-4": "oklch(0.49 0.22 264)",
          "chart-5": "oklch(0.42 0.18 266)",
          radius: "0.625rem",
          sidebar: "oklch(0.985 0 0)",
          "sidebar-foreground": "oklch(0.145 0 0)",
          "sidebar-primary": "oklch(0.205 0 0)",
          "sidebar-primary-foreground": "oklch(0.985 0 0)",
          "sidebar-accent": "oklch(0.97 0 0)",
          "sidebar-accent-foreground": "oklch(0.205 0 0)",
          "sidebar-border": "oklch(0.922 0 0)",
          "sidebar-ring": "oklch(0.708 0 0)",
          "font-sans":
            "ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif",
          "font-serif": "ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif",
          "font-mono": FIRA_CODE,
          "shadow-color": "oklch(0 0 0)",
          "shadow-opacity": "0.1",
          "shadow-blur": "3px",
          "shadow-spread": "0px",
          "shadow-offset-x": "0",
          "shadow-offset-y": "1px",
          "letter-spacing": "0em",
          spacing: "0.25rem",
        };

        var defaultDark = Object.assign({}, defaultLight, {
          background: "oklch(0.145 0 0)",
          foreground: "oklch(0.985 0 0)",
          card: "oklch(0.205 0 0)",
          "card-foreground": "oklch(0.985 0 0)",
          popover: "oklch(0.269 0 0)",
          "popover-foreground": "oklch(0.985 0 0)",
          primary: "oklch(0.922 0 0)",
          "primary-foreground": "oklch(0.205 0 0)",
          secondary: "oklch(0.269 0 0)",
          "secondary-foreground": "oklch(0.985 0 0)",
          muted: "oklch(0.269 0 0)",
          "muted-foreground": "oklch(0.708 0 0)",
          accent: "oklch(0.371 0 0)",
          "accent-foreground": "oklch(0.985 0 0)",
          destructive: "oklch(0.704 0.191 22.216)",
          "destructive-foreground": "oklch(0.985 0 0)",
          border: "oklch(0.275 0 0)",
          input: "oklch(0.325 0 0)",
          ring: "oklch(0.556 0 0)",
          sidebar: "oklch(0.205 0 0)",
          "sidebar-foreground": "oklch(0.985 0 0)",
          "sidebar-primary": "oklch(0.488 0.243 264.376)",
          "sidebar-primary-foreground": "oklch(0.985 0 0)",
          "sidebar-accent": "oklch(0.269 0 0)",
          "sidebar-accent-foreground": "oklch(0.985 0 0)",
          "sidebar-border": "oklch(0.275 0 0)",
          "sidebar-ring": "oklch(0.439 0 0)",
        });

        var stored = null;
        try {
          stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        } catch (e) {
          var legacy = localStorage.getItem(STORAGE_KEY);
          if (legacy === "light" || legacy === "dark") {
            stored = { mode: legacy, preset: "default" };
          }
        }

        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var mode =
          stored && (stored.mode === "light" || stored.mode === "dark")
            ? stored.mode
            : prefersDark
              ? "dark"
              : "light";

        var styles = stored && stored.styles ? stored.styles : null;
        var light = styles && styles.light ? styles.light : defaultLight;
        var dark = styles && styles.dark ? styles.dark : defaultDark;
        var active = mode === "dark" ? dark : light;
        var root = document.documentElement;

        if (mode === "dark") root.classList.add("dark");
        else root.classList.remove("dark");

        for (var i = 0; i < COMMON.length; i++) {
          var key = COMMON[i];
          var value = key === "font-mono" ? FIRA_CODE : light[key];
          if (value) root.style.setProperty("--" + key, value);
        }

        for (var token in active) {
          if (COMMON.indexOf(token) === -1 && active[token]) {
            root.style.setProperty("--" + token, active[token]);
          }
        }

        root.style.setProperty("--font-mono", FIRA_CODE);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
